{{ define "main" }}
  <section class="hero">
    <p class="eyebrow">Docs</p>
    <h1>{{ .Title }}</h1>
    {{ .Content }}
  </section>

  <section class="section-grid" aria-label="Top-level sections">
    {{ range site.Sections.ByWeight }}
      <a class="card" href="{{ .RelPermalink }}">
        <h2>{{ .Title }}</h2>
        {{ with .Params.description }}<p>{{ . }}</p>{{ end }}
      </a>
    {{ end }}
  </section>
{{ end }}
