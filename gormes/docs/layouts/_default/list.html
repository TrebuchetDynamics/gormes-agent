{{ define "main" }}
  <article class="page">
    <header class="page-header">
      <p class="eyebrow">Section</p>
      <h1>{{ .Title }}</h1>
      {{ with .Params.description }}<p class="lede">{{ . }}</p>{{ end }}
    </header>

    {{ .Content }}

    <div class="child-grid" aria-label="Pages in this section">
      {{ range .Pages.ByWeight }}
        <a class="card" href="{{ .RelPermalink }}">
          <h2>{{ .Title }}</h2>
          {{ with .Params.description }}<p>{{ . }}</p>{{ end }}
        </a>
      {{ end }}
    </div>
  </article>
{{ end }}
