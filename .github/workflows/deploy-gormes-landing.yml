name: Deploy gormes.ai landing

on:
  push:
    branches: [main]
    paths:
      - 'gormes/www.gormes.ai/**'
      - '.github/workflows/deploy-gormes-landing.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: gormes-landing-pages
  cancel-in-progress: true

jobs:
  deploy:
    # Guard: never run on the upstream Hermes repo if this workflow
    # ever gets synced there. Only TrebuchetDynamics/gormes-agent
    # owns the gormes.ai Cloudflare Pages project.
    if: github.repository == 'TrebuchetDynamics/gormes-agent'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: gormes/go.mod
          cache-dependency-path: gormes/go.sum

      - name: Build static export
        working-directory: gormes/www.gormes.ai
        run: go run ./cmd/www-gormes-export

      - name: Verify dist artifacts
        working-directory: gormes/www.gormes.ai
        run: |
          test -f dist/index.html
          test -f dist/install.sh
          test -f dist/static/site.css

      # First-run safety: create the Pages project if it doesn't
      # already exist under this account. Subsequent runs will see
      # the "project already exists" error and skip past it via
      # continue-on-error. Idempotent.
      - name: Ensure Pages project exists
        uses: cloudflare/wrangler-action@v3
        continue-on-error: true
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages project create gormes-agent-landing --production-branch=main

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy gormes/www.gormes.ai/dist --project-name=gormes-agent-landing --branch=main --commit-dirty=true

      # Attach custom domains via the Cloudflare Pages API. Idempotent —
      # an "already attached" response is logged but does not fail the
      # workflow. Cloudflare auto-provisions the required DNS records
      # when the apex/subdomain lives in the same account.
      - name: Attach custom domains
        env:
          CF_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -u
          for domain in gormes.ai www.gormes.ai; do
            echo "→ attaching ${domain}"
            response=$(curl -sS -o /tmp/cf-resp.json -w "%{http_code}" -X POST \
              "https://api.cloudflare.com/client/v4/accounts/${CF_ACCOUNT_ID}/pages/projects/gormes-agent-landing/domains" \
              -H "Authorization: Bearer ${CF_API_TOKEN}" \
              -H "Content-Type: application/json" \
              -d "{\"name\":\"${domain}\"}")
            case "$response" in
              200|201)
                echo "  ✓ attached"
                ;;
              409|400)
                echo "  • already attached (status $response) — skipping"
                ;;
              *)
                echo "  ✗ unexpected status $response"
                cat /tmp/cf-resp.json
                ;;
            esac
          done
